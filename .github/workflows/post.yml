name: Teen Girl Daily Log Auto-Poster

on:
  schedule:
    # Run twice per day: 2:30 PM and 7:30 PM Sri Lanka Time
    - cron: '0 9 * * *'   # 2:30 PM SL (9:00 AM UTC)
    - cron: '0 14 * * *'  # 7:30 PM SL (2:00 PM UTC)
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
    
    - name: Generate and Publish
      env:
        FAL_API_KEY: ${{ secrets.FAL_API_KEY }}
        LORA_MODEL_URL: ${{ secrets.LORA_MODEL_URL }}
        FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
        FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: python post.py