name: Generate Images Only

on:
  schedule:
    # Every 3 hours
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  generate-image:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Generate image with FAL
        id: generate
        env:
          FAL_API_KEY: ${{ secrets.FAL_API_KEY }}
          LORA_MODEL_URL: ${{ secrets.LORA_MODEL_URL }}
        run: python generate_image.py
      
      - name: Display generated image URL
        run: |
          echo "=================================================="
          echo "✓ IMAGE GENERATED SUCCESSFULLY"
          echo "=================================================="
          echo "Image URL:"
          cat image_url.txt
          echo ""
          echo "Rube will automatically monitor this workflow and publish to Facebook"
          echo "=================================================="
