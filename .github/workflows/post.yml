name: Teen Girl Daily Log Auto-Poster

on:
  schedule:
    # Run twice per day: 2:30 PM and 7:30 PM Sri Lanka Time
    - cron: '0 9 * * *'   # 2:30 PM SL (9:00 AM UTC)
    - cron: '0 14 * * *'  # 7:30 PM SL (2:00 PM UTC)
  workflow_dispatch:  # Allow manual trigger

jobs:
  post:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Generate image and publish via Composio
      env:
        FAL_API_KEY: ${{ secrets.FAL_API_KEY }}
        LORA_MODEL_URL: ${{ secrets.LORA_MODEL_URL }}
        COMPOSIO_TOKEN: ${{ secrets.COMPOSIO_TOKEN }}
      run: python post.py