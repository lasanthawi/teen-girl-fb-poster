name: Teen Girl Daily Log Auto-Poster

on:
  schedule:
    # 2:30 PM SL (9:00 AM UTC) and 7:30 PM SL (2:00 PM UTC)
    - cron: '0 9,14 * * *'
  workflow_dispatch:

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # sync FAL ~1–2 min + 5 min wait + publish
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Generate image with FAL
        id: generate
        env:
          FAL_API_KEY: ${{ secrets.FAL_API_KEY }}
          LORA_MODEL_URL: ${{ secrets.LORA_MODEL_URL }}
        run: python generate_image.py
      
      - name: Wait 5 minutes
        run: |
          echo "Waiting 5 minutes before publishing..."
          sleep 300
      
      - name: Publish to Facebook
        env:
          COMPOSIO_TOKEN: ${{ secrets.COMPOSIO_TOKEN }}
        run: python publish.py
