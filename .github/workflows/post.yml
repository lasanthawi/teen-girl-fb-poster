name: Generate and Publish to Facebook

on:
  schedule:
    # Every 3 hours
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate image with FAL
        env:
          FAL_API_KEY: ${{ secrets.FAL_API_KEY }}
          LORA_MODEL_URL: ${{ secrets.LORA_MODEL_URL }}
        run: python generate_image.py

      - name: Generate caption
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python generate_caption.py

      - name: Publish to Facebook via webhook
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: python publish.py

      - name: Summary
        run: |
          echo "=================================================="
          echo "Image URL: $(cat image_url.txt)"
          echo "Caption: $(cat caption.txt)"
          echo "=================================================="
