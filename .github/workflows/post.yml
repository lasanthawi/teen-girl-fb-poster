name: Generate & Trigger Publishing

on:
  schedule:
    # Every 3 hours
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  generate-and-trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v3
      
      - name: Trigger Rube Recipe via Webhook
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          echo "Calling webhook to trigger complete flow..."
          curl -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{"secret": "'"$WEBHOOK_SECRET"'"}' \
            -w "\nHTTP Status: %{http_code}\n" \
            -o response.json
          echo "Response:"
          cat response.json
          
          # Check if successful
          if grep -q '"success":true' response.json; then
            echo "✓ Post published successfully!"
            exit 0
          else
            echo "✗ Webhook call failed"
            exit 1
          fi
