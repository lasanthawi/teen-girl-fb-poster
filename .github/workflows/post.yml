name: Teen Girl Daily Log - Image Generation Only

on:
  schedule:
    # 2:30 PM SL (9:00 AM UTC) and 7:30 PM SL (2:00 PM UTC)
    - cron: '0 9,14 * * *'
  workflow_dispatch:

jobs:
  generate-image:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Generate image with FAL
        id: generate
        env:
          FAL_API_KEY: ${{ secrets.FAL_API_KEY }}
          LORA_MODEL_URL: ${{ secrets.LORA_MODEL_URL }}
        run: python generate_image.py
      
      - name: Image generation complete
        run: |
          echo "✓ Image generated and saved to image_url.txt"
          echo "Rube will pick this up and publish to Facebook"
          cat image_url.txt
